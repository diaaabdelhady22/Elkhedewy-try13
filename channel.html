<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAP0yi9cxRUfhATG7n9yZ5GvEwvprrcY_E",

authDomain: "admin-bc778.firebaseapp.com",

projectId: "admin-bc778",

storageBucket: "admin-bc778.firebasestorage.app",

messagingSenderId: "506982106111",

appId: "1:506982106111:web:b73205f62c722bc0121dca"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// لو مفيش كود -> روح لصفحة الكود
function goLogin(){
    localStorage.removeItem("userId");
    window.location.href = "code.html";
}

// التحقق من الكود
async function checkUser(){

    let code = new URLSearchParams(window.location.search).get("code");

    if(!code){
        code = localStorage.getItem("userId");
    }

    if(!code){
        goLogin();
        return;
    }

    const ref = doc(db, "students", code);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        goLogin();
        return;
    }

    const data = snap.data();

    if(!data.active){
        goLogin();
        return;
    }

    document.getElementById("nameDisplay").textContent = data.name;

    localStorage.setItem("userName", data.name);
    localStorage.setItem("userId", code);
}

checkUser();

</script>

<!-- ================= UI SCRIPT ================= -->

<script>

let ss = document.querySelector(".ss");
let openBtn = document.getElementById("kk");
let closeBtn = document.getElementById("closeSS");

openBtn.addEventListener("click", function () {
    ss.style.opacity = "1";
    ss.style.visibility = "visible";
    ss.style.right = "0";
});

closeBtn.addEventListener("click", function () {
    ss.style.opacity = "0";
    ss.style.visibility = "hidden";
    ss.style.right = "-1000px";
});

/* فتح الإعدادات */
document.getElementById("openSettings").onclick = function(){
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("settingsPage").style.display = "block";
};

/* رجوع */
document.getElementById("backBtn").onclick = function(){
    document.getElementById("settingsPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
};

/* دارك مود */
document.getElementById("darkMode").onchange = function(){
    if(this.checked){
        document.body.style.background = "white";
        document.body.style.color = "black";
    }else{
        document.body.style.background = "#030303";
        document.body.style.color = "white";
    }
};

/* انيميشن */
document.getElementById("animationToggle").onchange = function(){
    document.querySelectorAll("*").forEach(el=>{
        el.style.animationPlayState = this.checked ? "running" : "paused";
    });
};

/* particles */
document.getElementById("particlesToggle").onchange = function(){
    document.querySelector(".particles").style.display = this.checked ? "none" : "block";
};

/* font */
document.getElementById("fontToggle").onchange = function(){
    document.body.style.zoom = this.checked ? "110%" : "100%";
};

/* صوت */
document.getElementById("soundToggle").onchange = function(){
    document.querySelectorAll("audio,video").forEach(el=>{
        el.muted = !el.muted;
    });
};

/* إشعارات */
document.getElementById("notificationToggle").onchange = function(){
    alert(this.checked ? "تم تشغيل الإشعارات" : "تم إيقاف الإشعارات");
};

/* logout */

</script>

<script type="module">

// تنظيف + تحويل
function kickToIndex() {
    localStorage.removeItem("savedCode");
    localStorage.removeItem("userId");
    localStorage.removeItem("userName");

    window.location.replace("index.html");
}

async function checkAccess() {

    let code = new URLSearchParams(window.location.search).get("code");

    if(!code){
        code = localStorage.getItem("savedCode");
    }

    if(!code){
        kickToIndex();
        return;
    }

    const ref = doc(db, "students", code);
    const snap = await getDoc(ref);

    // الكود مش موجود
    if(!snap.exists()){
    alert("الكود غير صحيح");
    kickToIndex();
    return;
}

    const data = snap.data();

    // الطالب متوقف أو غير مسموح
    if(!data.active){
    alert("كودك متوقف");
        kickToIndex();
        return;
    }

    // الكود صح
    localStorage.setItem("savedCode", code);
    localStorage.setItem("userName", data.name);
}

checkAccess();

</script>
